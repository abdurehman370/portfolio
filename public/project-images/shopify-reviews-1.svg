<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shopify Reviews project preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081024"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="140" x2="1360" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C8CFF" stop-opacity="0.58"/>
