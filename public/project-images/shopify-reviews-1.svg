  <rect x="160" y="205" width="640" height="12" rx="6" fill="rgba(248,250,252,0.08)"/>
  <g>
    <rect x="160" y="270" width="780" height="470" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(248,250,252,0.10)"/>
    <rect x="970" y="270" width="470" height="160" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(248,250,252,0.10)"/>
